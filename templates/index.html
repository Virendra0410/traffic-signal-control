<!DOCTYPE html>
<html>
<head>
    <title>Traffic Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { font-family: Arial; margin: 0; background:#f4f6f9;}
        h1 { text-align:center; padding:20px; background:#2c3e50; color:white;}
        .container { padding:20px;}
        .controls { display:flex; gap:10px; margin-bottom:20px;}
        select, button { padding:10px;}
        button { background:#3498db; color:white; border:none;}
        .cards { display:flex; gap:15px;}
        .card { flex:1; background:white; padding:15px; border-radius:8px;}
    </style>
</head>

<body>

<h1>🚦 Traffic Signal Control Dashboard</h1>

<div class="container">

<div class="controls">
<select id="grid">
<option value="1x1">1x1</option>
<option value="3x3">3x3</option>
<option value="4x4">4x4</option>
<option value="real">Real Map</option>
</select>

<button onclick="run()">▶ Run Simulation</button>
</div>

<div class="cards">
<div class="card">
<h3>Status</h3>
<p id="status">Idle</p>
</div>

<div class="card">
<h3>Average Waiting</h3>
<p>Fixed: <span id="fixed"></span></p>
<p>Multi: <span id="multi"></span></p>
</div>
</div>

<canvas id="chart"></canvas>

</div>

<script>

let chart;

async function run(){

document.getElementById("status").innerText="Running...";

let grid=document.getElementById("grid").value;

let res=await fetch("/run",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({grid})
});

let data=await res.json();

document.getElementById("status").innerText="Completed";

function avg(a){return (a.reduce((x,y)=>x+y,0)/a.length).toFixed(2);}

document.getElementById("fixed").innerText=avg(data.fixed);
document.getElementById("multi").innerText=avg(data.multi);

if(chart) chart.destroy();

chart=new Chart(document.getElementById("chart"),{
type:"line",
data:{
labels:[...Array(data.fixed.length).keys()],
datasets:[
{label:"Fixed",data:data.fixed,borderColor:"red"},
{label:"Multi",data:data.multi,borderColor:"yellow"}
]
}
});

}

</script>

</body>
</html>
